<!-- 前面 UI 部分保持不變，重點修正 script 內的提交邏輯 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, getIdToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

  // Firebase 配置 (保持原本內容)
  const firebaseConfig = {
    apiKey: "AIzaSyDwAD3O6uNDWQoNITdeOEc4LqfLKC_IZRQ",
    authDomain: "tahoxdsafty.firebaseapp.com",
    projectId: "tahoxdsafty",
    storageBucket: "tahoxdsafty.firebasestorage.app",
    messagingSenderId: "863527866169",
    appId: "1:863527866169:web:eade7a0a7cfccf1be3a2e8",
    measurementId: "G-7EZNY89CC6"
  };

  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbvV2p_1-ZSc9lqFNx7UvvC_Qg_wHfAqLgxsbNpGCMHJNY_ho8bw-sKH8LDNsdVlNEZX/exec";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // 監聽登入
  onAuthStateChanged(auth, (user) => {
    const formOverlay = document.getElementById('formOverlay');
    const userInfo = document.getElementById('userInfo');
    if (user) {
      formOverlay.classList.add('hidden');
      formOverlay.style.display = 'none';
      userInfo.classList.remove('hidden');
      document.getElementById('userNameDisplay').innerText = `${user.displayName}`;
    } else {
      formOverlay.classList.remove('hidden');
      formOverlay.style.display = 'flex';
      userInfo.classList.add('hidden');
    }
  });

  document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
  document.getElementById('logoutBtn').onclick = () => signOut(auth);

  // 表單提交
  document.getElementById('safetyForm').onsubmit = async (e) => {
    e.preventDefault();
    const user = auth.currentUser;
    if (!user) return alert("請登入後再提交");

    const btn = document.getElementById('submitBtn');
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 提交中...';

    try {
      // 強制取得最新的 ID Token
      const idToken = await getIdToken(user, true);
      const fd = new FormData(e.target);
      const data = {};
      
      fd.forEach((value, key) => {
        if (data[key]) {
          data[key] = data[key] + ", " + value;
        } else {
          data[key] = value;
        }
      });

      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // 重要：GAS 的重導向常導致 CORS 錯誤，使用 no-cors 可確保請求發出，但看不到詳細回傳內容
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ token: idToken, formData: data })
      });

      // 由於使用了 no-cors，我們無法直接讀取 response.json()
      // 如果需要讀取回傳值，必須將 mode 改回 'cors' 並確保 GAS 部署為「所有人」
      
      // 假設正常運作 (因為 no-cors 無法抓取回傳結果，建議先用 cors 模式調試)
      alert("提交指令已發送！請檢查試算表。");
      document.getElementById('formContainer').classList.add('hidden');
      document.getElementById('successMsg').classList.remove('hidden');
      
    } catch (err) {
      console.error(err);
      alert("發生錯誤: " + err.message);
    } finally {
      btn.disabled = false;
      btn.innerText = originalText;
    }
  };
</script>
