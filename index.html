<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪客風險危害告知系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .card-selector:checked + label { 
      border-color: #1d4ed8; 
      background-color: #eff6ff; 
      box-shadow: 0 10px 15px -3px rgba(29, 78, 216, 0.2);
    }
    .card-selector:checked + label .icon-box { color: #1d4ed8; }
    .input-focus-effect:focus {
      background-color: white;
      border-color: #1d4ed8;
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
    }
    /* 遮罩，未登入時不允許填寫 */
    #formOverlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.8);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body class="bg-slate-200 min-h-screen p-4 md:p-8 text-slate-800">

  <!-- 頂部登入狀態列 -->
  <div class="max-w-4xl mx-auto mb-4 flex justify-end items-center space-x-4">
    <div id="userInfo" class="hidden text-sm font-bold text-slate-600 bg-white px-4 py-2 rounded-full shadow-sm">
      <i class="fas fa-user-circle mr-2 text-blue-600"></i><span id="userNameDisplay"></span>
      <button id="logoutBtn" class="ml-3 text-red-500 hover:text-red-700 underline text-xs">登出</button>
    </div>
  </div>

  <div class="max-w-4xl mx-auto relative">
    
    <div id="formContainer" class="relative">
      <!-- 登入遮罩 -->
      <div id="formOverlay" class="rounded-3xl">
        <i class="fas fa-lock text-6xl text-slate-400 mb-4"></i>
        <h3 class="text-xl font-bold text-slate-700 mb-6">請先驗證您的 Google 帳號</h3>
        <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all flex items-center">
          <i class="fab fa-google mr-3 text-xl"></i> 使用 Google 登入以填寫表單
        </button>
      </div>

      <div class="bg-white rounded-t-3xl border-b-8 border-blue-800 shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-800 to-blue-600 p-8 md:p-10 text-white text-center">
          <div class="flex items-center justify-center space-x-3 mb-4">
            <i class="fas fa-user-shield text-4xl"></i>
            <h1 class="text-3xl md:text-4xl font-black tracking-tight">訪客風險危害告知</h1>
          </div>
          <h2 class="text-xl font-bold mb-4 opacity-90 uppercase tracking-widest">Visitor Safety and Hazard Notification</h2>
          
          <div class="h-px w-full bg-blue-400 opacity-30 my-4"></div>
          
          <p class="text-blue-50 text-sm md:text-base font-medium leading-relaxed max-w-2xl mx-auto">
            Please read and acknowledge the potential risks and safety guidelines before entering the premises.<br>
            <span class="font-bold">(進入本場所前，請務必閱讀並確認潛在風險與安全指南。)</span>
          </p>
        </div>
      </div>

      <form id="safetyForm" class="bg-white p-6 md:p-12 rounded-b-3xl shadow-2xl space-y-10">
        
        <!-- 表單內容與原本完全相同，省略部分重複內容以保持簡潔 -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-slate-50 rounded-2xl border-2 border-slate-200 shadow-sm">
          <div class="space-y-2">
            <label class="block text-blue-900 font-black text-sm">1. 真實姓名 (Name) *</label>
            <input type="text" name="entry.1734412328" required class="input-focus-effect w-full border-2 border-slate-300 rounded-xl p-4 outline-none">
          </div>
          <div class="space-y-2">
            <label class="block text-blue-900 font-black text-sm">2. 公司 / Company</label>
            <input type="text" name="entry.1412794467" class="input-focus-effect w-full border-2 border-slate-300 rounded-xl p-4 outline-none">
          </div>
        </section>

        <!-- 身份 -->
        <section class="space-y-4">
          <label class="block text-slate-800 font-black text-lg border-l-8 border-blue-700 pl-4">3. 您的身份 / Role *</label>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <input type="radio" name="entry.1423583222" id="role1" value="訪客 (Visitor) General" class="card-selector hidden" required><label for="role1" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all text-center shadow-sm"><i class="fas fa-user-tag text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold text-slate-700">訪客 (Visitor)</span></label>
            <input type="radio" name="entry.1423583222" id="role2" value="新進人員 (New Employee HQ)" class="card-selector hidden"><label for="role2" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all text-center shadow-sm"><i class="fas fa-building text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold text-slate-700">新進人員 (HQ)</span></label>
            <input type="radio" name="entry.1423583222" id="role3" value="新進人員(New Employee Site)" class="card-selector hidden"><label for="role3" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all text-center shadow-sm"><i class="fas fa-helmet-safety text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold text-slate-700">新進人員 (Site)</span></label>
            <input type="radio" name="entry.1423583222" id="role4" value="承攬商 (Contractor)" class="card-selector hidden"><label for="role4" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all text-center shadow-sm"><i class="fas fa-hard-hat text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold text-slate-700">承攬商 (Contractor)</span></label>
          </div>
        </section>

        <section class="p-6 bg-slate-50 rounded-2xl border-2 border-slate-200">
          <label class="block text-slate-800 font-black text-sm mb-3">4. 日期 (Date)</label>
          <input type="date" name="entry.2111844014" id="todayDate" class="w-full md:w-64 border-2 border-slate-300 rounded-xl p-4 bg-white font-bold outline-none">
        </section>

        <!-- 風險區域 -->
        <section class="space-y-4">
          <label class="block text-slate-800 font-black text-lg border-l-8 border-blue-700 pl-4">5. 主要風險危害區域告知 *</label>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="flex"><input type="radio" name="entry.1021951042" id="risk1" value="威立雅安全政策 (Veolia Safety Policy)" class="card-selector hidden" required><label for="risk1" class="flex items-center w-full p-4 border-2 border-slate-300 rounded-xl cursor-pointer hover:shadow-md"><i class="fas fa-file-shield mr-3 text-blue-600 icon-box"></i><span class="text-xs font-bold text-slate-700 uppercase">威立雅安全政策</span></label></div>
            <div class="flex"><input type="radio" name="entry.1021951042" id="risk2" value="威立雅十大求生規則 (12 LSR & HRMS)" class="card-selector hidden"><label for="risk2" class="flex items-center w-full p-4 border-2 border-slate-300 rounded-xl cursor-pointer hover:shadow-md"><i class="fas fa-clipboard-list mr-3 text-blue-600 icon-box"></i><span class="text-xs font-bold text-slate-700 uppercase">十大求生規則</span></label></div>
            <div class="flex"><input type="radio" name="entry.1021951042" id="risk3" value="車輛/堆高機作業區域 (Vehicle/Forklift Operation Areas)" class="card-selector hidden"><label for="risk3" class="flex items-center w-full p-4 border-2 border-slate-300 rounded-xl cursor-pointer hover:shadow-md"><i class="fas fa-truck-moving mr-3 text-blue-600 icon-box"></i><span class="text-xs font-bold text-slate-700 uppercase">車輛/堆高機作業區域</span></label></div>
            <div class="flex"><input type="radio" name="entry.1021951042" id="risk4" value="高溫/高壓區域 (High Temperature/High Pressure Areas)" class="card-selector hidden"><label for="risk4" class="flex items-center w-full p-4 border-2 border-slate-300 rounded-xl cursor-pointer hover:shadow-md"><i class="fas fa-temperature-high mr-3 text-blue-600 icon-box"></i><span class="text-xs font-bold text-slate-700 uppercase">高溫/高壓區域</span></label></div>
          </div>
        </section>

        <!-- 行為準則 -->
        <section class="bg-blue-50 p-6 md:p-8 rounded-3xl border-2 border-blue-200 shadow-inner space-y-4">
          <p class="font-black text-blue-900 flex items-center"><i class="fas fa-check-double mr-2"></i>6. 安全行為準則 (請全數勾選)</p>
          <div class="grid grid-cols-1 gap-3">
            <label class="flex items-center p-4 bg-white border border-blue-100 rounded-xl cursor-pointer shadow-sm"><input type="checkbox" name="entry.339193093" value="同意 (Agree)" required class="w-6 h-6 mr-4"><span class="text-xs font-bold text-slate-700 uppercase tracking-tight">配戴必要的個人防護裝備 (PPE)</span></label>
            <label class="flex items-center p-4 bg-white border border-blue-100 rounded-xl cursor-pointer shadow-sm"><input type="checkbox" name="entry.1092091010" value="同意 (Agree)" required class="w-6 h-6 mr-4"><span class="text-xs font-bold text-slate-700 uppercase tracking-tight">遵守所有安全標誌與警告</span></label>
            <label class="flex items-center p-4 bg-white border border-blue-100 rounded-xl cursor-pointer shadow-sm"><input type="checkbox" name="entry.1982857503" value="同意 (Agree)" required class="w-6 h-6 mr-4"><span class="text-xs font-bold text-slate-700 uppercase tracking-tight">不隨意動火或吸煙</span></label>
            <label class="flex items-center p-4 bg-white border border-blue-100 rounded-xl cursor-pointer shadow-sm"><input type="checkbox" name="entry.1160474227" value="同意 (Agree)" required class="w-6 h-6 mr-4"><span class="text-xs font-bold text-slate-700 uppercase tracking-tight">發現不安全狀況立即通知管理單位</span></label>
          </div>
        </section>

        <section class="space-y-4">
          <label class="block text-slate-800 font-black text-lg border-l-8 border-blue-700 pl-4">7. 緊急應變資訊 *</label>
          <div class="grid grid-cols-1 gap-3">
            <label class="flex items-center p-5 bg-amber-50 border-2 border-amber-200 rounded-2xl cursor-pointer shadow-sm">
              <input type="checkbox" name="entry.1552646900" value="我已獲知緊急集合點位置" required class="w-7 h-7 mr-4 text-amber-600">
              <span class="text-xs font-bold text-amber-900 leading-tight uppercase tracking-tight">我已獲知緊急集合點位置</span>
            </label>
          </div>
        </section>

        <section class="pt-6 border-t-4 border-slate-100">
          <label class="flex items-start p-8 bg-emerald-700 rounded-3xl cursor-pointer shadow-xl hover:bg-emerald-800 transition-all">
            <input type="checkbox" name="entry.822252265" value="同意 (Agree)" required class="w-8 h-8 mr-4 flex-shrink-0">
            <span class="text-lg font-black text-white leading-tight">我完全理解並將嚴格遵守上述安全公告的規定。</span>
          </label>
        </section>

        <button type="submit" id="submitBtn" class="w-full bg-blue-800 hover:bg-black text-white font-black py-6 rounded-3xl shadow-2xl text-2xl transition-all">
          確認提交安全申報 (Confirm Submission)
        </button>
      </form>
    </div>

    <!-- 成功訊息 -->
    <div id="successMsg" class="hidden bg-white p-20 rounded-3xl shadow-2xl text-center space-y-6">
      <div class="w-32 h-32 bg-emerald-100 rounded-full flex items-center justify-center mx-auto text-6xl text-emerald-600">
        <i class="fas fa-check-double"></i>
      </div>
      <h2 class="text-4xl font-black text-slate-800">提交成功！</h2>
      <p class="text-slate-500 font-bold uppercase tracking-wide">Submission Successful</p>
      <button onclick="resetForm()" class="bg-blue-800 hover:bg-blue-900 text-white font-black py-4 px-12 rounded-2xl shadow-lg transition-all active:scale-95">
        填寫下一份 (Fill another)
      </button>
    </div>
  </div>

  <!-- Firebase v10 SDK 載入與設定 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, getIdToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 🔴 步驟 1：請貼上您的 Firebase Config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // 🔴 步驟 2：貼上部署 GAS 後獲得的 Web App 網址
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 處理登入/登出 UI 顯示
    const formOverlay = document.getElementById('formOverlay');
    const userInfo = document.getElementById('userInfo');
    const userNameDisplay = document.getElementById('userNameDisplay');

    // 監聽登入狀態
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // 已登入：隱藏遮罩，顯示使用者名稱
        formOverlay.style.display = 'none';
        userInfo.classList.remove('hidden');
        userNameDisplay.innerText = user.displayName + " (" + user.email + ")";
      } else {
        // 未登入：顯示遮罩，隱藏使用者資訊
        formOverlay.style.display = 'flex';
        userInfo.classList.add('hidden');
      }
    });

    // 登入按鈕事件
    document.getElementById('loginBtn').addEventListener('click', () => {
      signInWithPopup(auth, provider).catch((error) => {
        alert("登入失敗：" + error.message);
      });
    });

    // 登出按鈕事件
    document.getElementById('logoutBtn').addEventListener('click', () => {
      signOut(auth);
    });

    // 預設填入今日日期
    const setDate = () => document.getElementById('todayDate').value = new Date().toISOString().split('T')[0];
    setDate();

    // 覆寫表單送出事件
    document.getElementById('safetyForm').addEventListener('submit', async (e) => {
      e.preventDefault(); // 防止網頁重整
      
      const user = auth.currentUser;
      if (!user) {
        alert("請先登入 Google 帳號！");
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-3"></i>正在儲存中 (Saving)...';

      try {
        // 取得安全驗證 Token (這會傳給 GAS 驗證身份)
        const idToken = await getIdToken(user, true);

        // 收集表單資料
        const formElement = e.target;
        const formDataObj = {};
        new FormData(formElement).forEach((value, key) => {
            // 處理多選 Checkbox (如果同一個 name 有多個值，合併為字串)
            if(!formDataObj[key]){
                formDataObj[key] = value;
            } else {
                formDataObj[key] = formDataObj[key] + ", " + value;
            }
        });

        // 準備要傳送的 Payload
        const payload = {
          token: idToken,
          formData: formDataObj
        };

        // 發送 POST 請求至 GAS API
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          // GAS 接收 fetch POST 需要用 text/plain，內容再自己 parse
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === "success") {
          document.getElementById('formContainer').classList.add('hidden');
          document.getElementById('successMsg').classList.remove('hidden');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          throw new Error(result.message);
        }

      } catch (error) {
        alert("連線或寫入錯誤：" + error.message);
        btn.disabled = false;
        btn.innerText = "確認提交安全申報 (Confirm Submission)";
      }
    });

    // 暴露 resetForm 給全域 (因為 module scope 的關係)
    window.resetForm = () => {
      document.getElementById('safetyForm').reset();
      setDate();
      document.getElementById('successMsg').classList.add('hidden');
      document.getElementById('formContainer').classList.remove('hidden');
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.innerText = "確認提交安全申報 (Confirm Submission)";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  </script>
</body>
</html>
