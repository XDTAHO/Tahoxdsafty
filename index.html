<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新店廠風險危害告知系統</title>
  
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .input-focus-effect:focus {
      background-color: white;
      border-color: #1d4ed8;
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
    }
    .custom-input { 
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
    }
    .custom-input:checked + .custom-label-blue {
      border-color: #2563eb !important; background-color: #dbeafe !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
    }
    .custom-input:checked + .custom-label-blue .text-desc { color: #1e3a8a !important; }
    .custom-input:checked + .custom-label-blue .icon-unchecked { display: none !important; }
    .custom-input:checked + .custom-label-blue .icon-checked { display: inline-block !important; }
    .custom-input:checked + .custom-label-amber {
      border-color: #d97706 !important; background-color: #fef3c7 !important;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
    }
    .custom-input:checked + .custom-label-amber .text-desc { color: #78350f !important; }
    .custom-input:checked + .custom-label-amber .icon-unchecked { display: none !important; }
    .custom-input:checked + .custom-label-amber .icon-checked { display: inline-block !important; }
    .custom-input:checked + .custom-label-emerald {
      border-color: #059669 !important; background-color: #059669 !important;
      box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.4) !important;
    }
    .custom-input:checked + .custom-label-emerald .text-desc { color: #ffffff !important; }
    .custom-input:checked + .custom-label-emerald .icon-unchecked { display: none !important; }
    .custom-input:checked + .custom-label-emerald .icon-checked { display: inline-block !important; }
  </style>
</head>
<!-- 【修復 2】將 min-h-screen 改為 min-h-[100dvh]，完美解決 iOS Safari 底部被遮擋的問題 -->
<body class="bg-slate-200 min-h-[100dvh] p-2 md:p-8 text-slate-800 relative">

  <div class="max-w-4xl mx-auto" id="mainAppWrapper">
    <!-- 整個表單的容器 -->
    <div id="formContainer">
      
      <!-- 表單頭部 -->
      <div class="bg-white rounded-t-2xl md:rounded-t-3xl border-b-8 border-blue-800 shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-800 to-blue-600 p-6 md:p-10 text-white text-center">
          <div class="flex items-center justify-center space-x-2 md:space-x-3 mb-2 md:mb-4">
            <i class="fas fa-user-shield text-3xl md:text-4xl"></i>
            <h1 id="mainTitle" class="text-2xl md:text-4xl font-black tracking-tight">載入中...</h1>
          </div>
          <h2 id="subTitle" class="text-xs md:text-xl font-bold opacity-90 uppercase tracking-widest">Loading...</h2>
        </div>
      </div>

      <!-- 載入中動畫 -->
      <div id="loadingOverlay" class="bg-white p-16 md:p-20 rounded-b-2xl md:rounded-b-3xl shadow-2xl flex flex-col items-center justify-center space-y-6">
        <i class="fas fa-spinner fa-spin text-5xl md:text-6xl text-blue-800"></i>
        <p class="text-blue-800 font-bold text-base md:text-xl tracking-widest">正在從雲端載入表單配置...</p>
      </div>

      <form id="safetyForm" class="bg-slate-50 p-4 md:p-10 rounded-b-2xl md:rounded-b-3xl shadow-2xl space-y-6 md:space-y-8 hidden" novalidate>
        
        <div id="langSwitcher" class="grid grid-cols-4 md:flex md:flex-wrap gap-1.5 md:gap-2 pb-2 md:pb-3 border-b-2 border-slate-200"></div>

        <div id="dynamicFields" class="space-y-6 md:space-y-8"></div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-800 hover:bg-black text-white font-black py-4 md:py-6 rounded-xl md:rounded-3xl shadow-lg md:shadow-2xl text-lg md:text-2xl transition-all flex justify-center items-center">
          <span id="submitBtnText">確認提交</span>
        </button>
      </form>
    </div>

    <!-- 送出成功畫面 -->
    <div id="successMsg" class="hidden bg-white p-12 md:p-20 rounded-2xl md:rounded-3xl shadow-2xl text-center space-y-4 md:space-y-6">
      <div class="w-24 h-24 md:w-32 md:h-32 bg-emerald-100 rounded-full flex items-center justify-center mx-auto text-4xl md:text-6xl text-emerald-600">
        <i class="fas fa-check-double"></i>
      </div>
      <h2 id="successTitle" class="text-2xl md:text-4xl font-black text-slate-800">提交成功！</h2>
      <p id="successText" class="text-sm md:text-base text-slate-500 font-bold uppercase tracking-wide">Submission Successful</p>
      <button type="button" id="resetBtn" class="bg-blue-800 hover:bg-blue-900 text-white font-black py-3 md:py-4 px-8 md:px-12 rounded-xl md:rounded-2xl shadow-lg transition-all active:scale-95 text-sm md:text-base mt-2">
        <span id="resetBtnText">填寫下一份</span>
      </button>
    </div>
  </div>

  <!-- Firebase 與核心邏輯 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDwAD3O6uNDWQoNITdeOEc4LqfLKC_IZRQ",
      authDomain: "tahoxdsafty.firebaseapp.com",
      projectId: "tahoxdsafty",
      storageBucket: "tahoxdsafty.firebasestorage.app",
      messagingSenderId: "863527866169",
      appId: "1:863527866169:web:eade7a0a7cfccf1be3a2e8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('safetyForm');
    const submitBtn = document.getElementById('submitBtn');

    let schemaQuestions = [];
    let configDataCache = {};
    let currentLang = 'zh-TW'; 
    let supportedLangs = [{code: 'zh-TW', label: '繁體中文'}]; 
    let i18nDicts = {}; 

    const saveFormData = () => {
      const formData = new FormData(form);
      const data = {};
      schemaQuestions.forEach(q => {
        if (q.type === 'checkbox') {
          data[q.id] = formData.getAll(q.id);
        } else {
          data[q.id] = formData.get(q.id) || "";
        }
      });
      sessionStorage.setItem('visitorFormData', JSON.stringify(data));
    };

    const restoreFormData = () => {
      const saved = sessionStorage.getItem('visitorFormData');
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        schemaQuestions.forEach(q => {
           if (data[q.id] !== undefined && data[q.id] !== null) {
             const elements = form.elements[q.id];
             if (!elements) return;
             if (q.type === 'checkbox' || q.type === 'radio') {
               const elList = elements.length !== undefined && !elements.tagName ? elements : [elements];
               for (let i = 0; i < elList.length; i++) {
                 if (q.type === 'checkbox') {
                   elList[i].checked = Array.isArray(data[q.id]) && data[q.id].includes(elList[i].value);
                 } else if (q.type === 'radio') {
                   elList[i].checked = (elList[i].value === data[q.id]);
                 }
               }
             } else {
               elements.value = data[q.id];
             }
           }
        });
      } catch(e) { console.error('還原資料失敗:', e); }
    };

    form.addEventListener('input', saveFormData);
    form.addEventListener('change', saveFormData);

    const t = (text) => {
      if (currentLang === 'zh-TW' || !i18nDicts[currentLang]) return text;
      return i18nDicts[currentLang][text] || text;
    };

    function renderLangSwitcher() {
      const container = document.getElementById('langSwitcher');
      container.innerHTML = '';
      
      supportedLangs.forEach(lang => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.innerText = lang.label;
        if (currentLang === lang.code) {
          btn.className = 'px-1 md:px-5 py-1.5 md:py-2 bg-blue-600 text-white font-bold rounded-md md:rounded-xl shadow-md transition-all text-[11px] md:text-sm flex items-center justify-center leading-tight tracking-tighter md:tracking-normal';
        } else {
          btn.className = 'px-1 md:px-5 py-1.5 md:py-2 bg-white text-slate-600 hover:bg-blue-50 hover:text-blue-600 font-bold rounded-md md:rounded-xl transition-all border border-slate-200 text-[11px] md:text-sm shadow-sm flex items-center justify-center leading-tight tracking-tighter md:tracking-normal';
        }
        btn.onclick = () => {
          saveFormData(); 
          currentLang = lang.code;
          renderLangSwitcher(); 
          updateStaticUI();     
          renderDynamicForm(schemaQuestions); 
          restoreFormData(); 
        };
        container.appendChild(btn);
      });
    }

    function updateStaticUI() {
      document.getElementById('mainTitle').innerText = t(configDataCache.FORM_TITLE || '訪客風險危害告知');
      document.getElementById('subTitle').innerText = t(configDataCache.FORM_SUBTITLE || 'Visitor Safety and Hazard Notification');
      document.getElementById('successText').innerText = t(configDataCache.SUCCESS_MSG || 'Submission Successful');
      document.getElementById('submitBtnText').innerText = t('確認提交');
      
      document.getElementById('successTitle').innerText = t('提交成功！');
      document.getElementById('resetBtnText').innerText = t('填寫下一份');
    }

    const WORKER_URL = '/api/form'; 

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch(WORKER_URL);
        if (!response.ok) throw new Error("無法取得設定");
        const data = await response.json();

        configDataCache = data.config || {};
        schemaQuestions = data.schema?.questions || [];
        const i18nData = data.i18n || {};
        
        if (i18nData.supported_languages) {
          i18nData.supported_languages.forEach(lang => {
             if(lang.code !== 'zh-TW') supportedLangs.push(lang);
          });
        }
        Object.keys(i18nData).forEach(key => {
          if (key.startsWith('dict_')) {
            const code = key.replace('dict_', '');
            try { i18nDicts[code] = JSON.parse(i18nData[key]); } catch(e) {}
          }
        });

        if (configDataCache.IS_ACTIVE === false || String(configDataCache.IS_ACTIVE).toUpperCase() === 'FALSE') {
          document.getElementById('loadingOverlay').innerHTML = `<p class="text-red-600 font-black text-xl md:text-2xl">表單目前尚未開放填寫 (Form is currently closed)</p>`;
          return; 
        }

        renderLangSwitcher();
        updateStaticUI();
        renderDynamicForm(schemaQuestions);
        restoreFormData();

        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('safetyForm').classList.remove('hidden');

      } catch (error) {
        console.error("初始化錯誤:", error);
        document.getElementById('loadingOverlay').innerHTML = `<p class="text-red-600 font-bold text-lg md:text-xl">載入失敗：無法連線至雲端節點。</p>`;
      }
    });

    function renderDynamicForm(questions) {
      const container = document.getElementById('dynamicFields');
      container.innerHTML = '';
      
      questions.forEach(q => {
        const isRequired = q.required === true || String(q.required).toUpperCase() === 'TRUE';
        const reqMark = isRequired ? '<span class="text-red-500 ml-1 text-lg md:text-xl">*</span>' : '';
        const options = q.options ? q.options.split('|').map(o => o.trim()).filter(o => o) : [];
        let html = '';

        const sectionWrapperStart = `
          <div class="bg-white p-4 md:p-8 rounded-xl md:rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition-shadow duration-300">
            <h3 class="flex items-center text-base md:text-xl font-black text-slate-800 mb-3 md:mb-5">
              <div class="w-1.5 h-5 md:h-6 bg-blue-600 rounded-full mr-2 md:mr-3"></div>${t(q.label)} ${reqMark}
            </h3>`;
        const sectionWrapperEnd = `</div>`;

        if (q.type === 'text') {
          html = sectionWrapperStart + `
            <input type="text" name="${q.id}" ${isRequired ? 'required' : ''} class="input-focus-effect w-full bg-slate-50 border-2 border-slate-200 text-slate-800 rounded-lg md:rounded-xl p-3 md:p-4 outline-none font-bold transition-all text-sm md:text-lg">
          ` + sectionWrapperEnd;
        } 
        else if (q.type === 'date') {
          html = sectionWrapperStart + `
            <input type="date" name="${q.id}" ${isRequired ? 'required' : ''} class="w-full md:w-64 input-focus-effect bg-slate-50 border-2 border-slate-200 text-slate-800 rounded-lg md:rounded-xl p-3 md:p-4 outline-none font-bold transition-all date-auto-fill text-sm md:text-lg">
          ` + sectionWrapperEnd;
        } 
        else if (q.type === 'radio') {
          let gridCols = '';
          if (options.length === 2) gridCols = 'md:grid-cols-2';
          else if (options.length === 3) gridCols = 'md:grid-cols-3';
          else if (options.length === 4) gridCols = 'md:grid-cols-2 lg:grid-cols-4';
          else gridCols = 'md:grid-cols-2 lg:grid-cols-3';

          let optsHtml = options.map((opt, i) => `
            <div class="flex">
              <input type="radio" name="${q.id}" id="${q.id}_${i}" value="${opt}" class="custom-input" ${isRequired && i === 0 ? 'required' : ''}>
              <label for="${q.id}_${i}" class="custom-label-blue flex items-center w-full p-3 md:p-4 border-2 border-slate-200 bg-slate-50/80 rounded-lg md:rounded-xl cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all shadow-sm">
                <i class="far fa-circle text-slate-300 icon-unchecked text-xl md:text-2xl mr-2 md:mr-3 flex-shrink-0"></i>
                <i class="fas fa-dot-circle text-blue-600 icon-checked text-xl md:text-2xl mr-2 md:mr-3 flex-shrink-0" style="display: none;"></i>
                <span class="text-sm md:text-base font-bold text-slate-700 text-desc">${t(opt)}</span>
              </label>
            </div>
          `).join('');
          html = sectionWrapperStart + `<div class="grid grid-cols-1 ${gridCols} gap-2 md:gap-3">${optsHtml}</div>` + sectionWrapperEnd;
        } 
        else if (q.type === 'checkbox') {
          if (q.id === 'agreement') {
            let optsHtml = options.map((opt, i) => `
              <div class="flex">
                <input type="checkbox" name="${q.id}" id="${q.id}_${i}" value="${opt}" class="custom-input" ${isRequired ? 'required' : ''}>
                <label for="${q.id}_${i}" class="custom-label-emerald flex items-start w-full p-4 md:p-6 bg-emerald-50/50 border-2 border-emerald-300 rounded-xl md:rounded-2xl cursor-pointer hover:bg-emerald-100 hover:border-emerald-400 transition-all shadow-sm">
                  <i class="far fa-square text-emerald-400 icon-unchecked text-xl md:text-2xl mr-3 md:mr-4 mt-0.5 flex-shrink-0"></i>
                  <i class="fas fa-check-square text-white icon-checked text-xl md:text-2xl mr-3 md:mr-4 mt-0.5 flex-shrink-0" style="display: none;"></i>
                  <span class="text-base md:text-lg font-black text-emerald-900 leading-snug md:leading-relaxed transition-colors text-desc">${t(opt)}</span>
                </label>
              </div>
            `).join('');
            html = sectionWrapperStart + `<div class="space-y-2 md:space-y-3">${optsHtml}</div>` + sectionWrapperEnd;
          } 
          else if (q.id === 'emergency_info') {
            let optsHtml = options.map((opt, i) => `
              <div class="flex">
                <input type="checkbox" name="${q.id}" id="${q.id}_${i}" value="${opt}" class="custom-input" ${isRequired ? 'required' : ''}>
                <label for="${q.id}_${i}" class="custom-label-amber flex items-center w-full p-3 md:p-5 bg-amber-50/50 border-2 border-amber-200 rounded-lg md:rounded-xl cursor-pointer hover:bg-amber-100 hover:border-amber-300 transition-all shadow-sm">
                  <i class="far fa-square text-amber-300 icon-unchecked text-lg md:text-xl mr-3 md:mr-4 flex-shrink-0"></i>
                  <i class="fas fa-check-square text-amber-600 icon-checked text-lg md:text-xl mr-3 md:mr-4 flex-shrink-0" style="display: none;"></i>
                  <span class="text-sm md:text-base font-bold text-amber-900 leading-tight transition-colors text-desc">${t(opt)}</span>
                </label>
              </div>
            `).join('');
            html = sectionWrapperStart + `<div class="grid grid-cols-1 gap-2 md:gap-3">${optsHtml}</div>` + sectionWrapperEnd;
          } 
          else {
            let optsHtml = options.map((opt, i) => `
              <div class="flex">
                <input type="checkbox" name="${q.id}" id="${q.id}_${i}" value="${opt}" class="custom-input" ${isRequired ? 'required' : ''}>
                <label for="${q.id}_${i}" class="custom-label-blue flex items-center w-full p-3 md:p-4 bg-slate-50/50 border-2 border-slate-200 rounded-lg md:rounded-xl cursor-pointer hover:border-blue-300 hover:bg-blue-50/80 transition-all shadow-sm">
                  <i class="far fa-square text-slate-300 icon-unchecked text-lg md:text-xl mr-3 md:mr-4 flex-shrink-0"></i>
                  <i class="fas fa-check-square text-blue-600 icon-checked text-lg md:text-xl mr-3 md:mr-4 flex-shrink-0" style="display: none;"></i>
                  <span class="text-sm md:text-base font-bold text-slate-700 tracking-tight transition-colors text-desc leading-snug">${t(opt)}</span>
                </label>
              </div>
            `).join('');
            html = sectionWrapperStart + `<div class="grid grid-cols-1 gap-2 md:gap-3">${optsHtml}</div>` + sectionWrapperEnd;
          }
        }
        container.insertAdjacentHTML('beforeend', html);
      });

      document.querySelectorAll('.date-auto-fill').forEach(el => {
        if (!el.value) el.value = new Date().toISOString().split('T')[0];
      });
    }

    const sanitizeInput = (str) => {
      if (typeof str !== 'string') return str;
      return str.replace(/[&<>"']/g, (m) => {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
        return map[m];
      });
    };

    submitBtn.addEventListener('click', (e) => {
      if (!form.checkValidity()) {
        e.preventDefault(); 
        alert(t('您尚有必填欄位未完成，請檢查帶有 * 記號的項目！'));
        const firstInvalid = form.querySelector(':invalid');
        if (firstInvalid) {
          const card = firstInvalid.closest('.bg-white') || firstInvalid.closest('.bg-slate-50') || firstInvalid.parentElement;
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.classList.add('ring-4', 'ring-red-400', 'transition-all', 'duration-300');
          setTimeout(() => card.classList.remove('ring-4', 'ring-red-400'), 2500);
        }
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); 

      // 【修復 5】離線卡死防護
      if (!navigator.onLine) {
        alert(t('目前網路連線不穩或已斷線，請確認網路狀態後再提交！'));
        return;
      }

      // 【修復 4】防洗版防護 (30 秒冷卻)
      const lastSubmitTime = localStorage.getItem('lastSubmitTimestamp');
      if (lastSubmitTime && (Date.now() - parseInt(lastSubmitTime) < 30000)) {
        alert(t('您提交的太頻繁了！為保護系統，請稍候 30 秒再試。'));
        return;
      }

      submitBtn.disabled = true;
      // [修正] 精準替換 span 的內容，避免破壞 DOM 結構導致翻譯函數報錯
      document.getElementById('submitBtnText').innerHTML = '<i class="fas fa-spinner fa-spin mr-2 md:mr-3"></i>' + t('正在儲存中 (Saving)...');

      const formData = new FormData(form);
      const submissionData = { 
        createdAt: serverTimestamp(),
        submitterEmail: 'anonymous', // 移除登入機制後，紀錄為匿名
      };

      schemaQuestions.forEach(q => {
        if (q.type === 'checkbox') {
          submissionData[q.id] = sanitizeInput(formData.getAll(q.id).join(", "));
        } else {
          submissionData[q.id] = sanitizeInput(formData.get(q.id) || "");
        }
      });

      try {
        await addDoc(collection(db, "submissions"), submissionData);
        sessionStorage.removeItem('visitorFormData'); 
        
        // 成功後記錄時間，啟動防洗版機制
        localStorage.setItem('lastSubmitTimestamp', Date.now().toString());

        document.getElementById('formContainer').classList.add('hidden');
        document.getElementById('successMsg').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        console.error("寫入錯誤:", error);
        alert(t('寫入失敗：') + error.message);
      } finally {
        submitBtn.disabled = false;
        document.getElementById('submitBtnText').innerText = t('確認提交');
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      sessionStorage.removeItem('visitorFormData'); 
      form.reset();
      document.querySelectorAll('.date-auto-fill').forEach(el => el.value = new Date().toISOString().split('T')[0]);
      document.getElementById('successMsg').classList.add('hidden');
      document.getElementById('formContainer').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
