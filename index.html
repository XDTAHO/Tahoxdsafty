<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪客風險危害告知系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .card-selector:checked + label { 
      border-color: #1d4ed8; 
      background-color: #eff6ff; 
      box-shadow: 0 10px 15px -3px rgba(29, 78, 216, 0.2);
    }
    .card-selector:checked + label .icon-box { color: #1d4ed8; }
    .input-focus-effect:focus {
      background-color: white;
      border-color: #1d4ed8;
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
    }
    #formOverlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.8);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body class="bg-slate-200 min-h-screen p-4 md:p-8 text-slate-800">

  <!-- 頂部登入狀態列 -->
  <div class="max-w-4xl mx-auto mb-4 flex justify-end items-center space-x-4">
    <div id="userInfo" class="hidden text-sm font-bold text-slate-600 bg-white px-4 py-2 rounded-full shadow-sm">
      <i class="fas fa-user-circle mr-2 text-blue-600"></i><span id="userNameDisplay"></span>
      <button id="logoutBtn" class="ml-3 text-red-500 hover:text-red-700 underline text-xs">登出</button>
    </div>
  </div>

  <div class="max-w-4xl mx-auto relative">
    <div id="formContainer" class="relative">
      <!-- 登入遮罩 -->
      <div id="formOverlay" class="rounded-3xl">
        <i class="fas fa-lock text-6xl text-slate-400 mb-4"></i>
        <h3 class="text-xl font-bold text-slate-700 mb-6">請先驗證您的 Google 帳號</h3>
        <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all flex items-center">
          <i class="fab fa-google mr-3 text-xl"></i> 使用 Google 登入以填寫表單
        </button>
      </div>

      <div class="bg-white rounded-t-3xl border-b-8 border-blue-800 shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-800 to-blue-600 p-8 md:p-10 text-white text-center">
          <div class="flex items-center justify-center space-x-3 mb-4">
            <i class="fas fa-user-shield text-4xl"></i>
            <h1 class="text-3xl md:text-4xl font-black tracking-tight">訪客風險危害告知</h1>
          </div>
          <h2 class="text-xl font-bold mb-4 opacity-90 uppercase tracking-widest">Visitor Safety and Hazard Notification</h2>
          <div class="h-px w-full bg-blue-400 opacity-30 my-4"></div>
          <p class="text-blue-50 text-sm md:text-base font-medium leading-relaxed max-w-2xl mx-auto">
            Please read and acknowledge the potential risks and safety guidelines before entering the premises.<br>
            <span class="font-bold">(進入本場所前，請務必閱讀並確認潛在風險與安全指南。)</span>
          </p>
        </div>
      </div>

      <form id="safetyForm" class="bg-white p-6 md:p-12 rounded-b-3xl shadow-2xl space-y-10">
        <!-- 基本資料 -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-slate-50 rounded-2xl border-2 border-slate-200 shadow-sm">
          <div class="space-y-2">
            <label class="block text-blue-900 font-black text-sm">1. 真實姓名 (Name) *</label>
            <input type="text" name="entry.1734412328" required class="input-focus-effect w-full border-2 border-slate-300 rounded-xl p-4 outline-none">
          </div>
          <div class="space-y-2">
            <label class="block text-blue-900 font-black text-sm">2. 公司 / Company</label>
            <input type="text" name="entry.1412794467" class="input-focus-effect w-full border-2 border-slate-300 rounded-xl p-4 outline-none">
          </div>
        </section>

        <!-- 身份選擇 -->
        <section class="space-y-4">
          <label class="block text-slate-800 font-black text-lg border-l-8 border-blue-700 pl-4">3. 您的身份 / Role *</label>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <input type="radio" name="entry.1423583222" id="role1" value="訪客 (Visitor)" class="card-selector hidden" required><label for="role1" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all shadow-sm"><i class="fas fa-user-tag text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold">訪客</span></label>
            <input type="radio" name="entry.1423583222" id="role2" value="新進人員 (HQ)" class="card-selector hidden"><label for="role2" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all shadow-sm"><i class="fas fa-building text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold">新進 (HQ)</span></label>
            <input type="radio" name="entry.1423583222" id="role3" value="新進人員 (Site)" class="card-selector hidden"><label for="role3" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all shadow-sm"><i class="fas fa-helmet-safety text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold">新進 (Site)</span></label>
            <input type="radio" name="entry.1423583222" id="role4" value="承攬商" class="card-selector hidden"><label for="role4" class="flex flex-col items-center p-6 border-2 border-slate-300 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all shadow-sm"><i class="fas fa-hard-hat text-2xl mb-2 text-slate-400 icon-box"></i><span class="text-xs font-bold">承攬商</span></label>
          </div>
        </section>

        <section class="p-6 bg-slate-50 rounded-2xl border-2 border-slate-200">
          <label class="block text-slate-800 font-black text-sm mb-3">4. 日期 (Date)</label>
          <input type="date" name="entry.2111844014" id="todayDate" class="w-full md:w-64 border-2 border-slate-300 rounded-xl p-4 bg-white font-bold outline-none">
        </section>

        <!-- 提交按鈕 -->
        <button type="submit" id="submitBtn" class="w-full bg-blue-800 hover:bg-black text-white font-black py-6 rounded-3xl shadow-2xl text-2xl transition-all">
          確認提交安全申報 (Confirm Submission)
        </button>
      </form>
    </div>

    <!-- 成功訊息 -->
    <div id="successMsg" class="hidden bg-white p-20 rounded-3xl shadow-2xl text-center space-y-6">
      <div class="w-32 h-32 bg-emerald-100 rounded-full flex items-center justify-center mx-auto text-6xl text-emerald-600">
        <i class="fas fa-check-double"></i>
      </div>
      <h2 class="text-4xl font-black text-slate-800">提交成功！</h2>
      <button onclick="resetForm()" class="bg-blue-800 hover:bg-blue-900 text-white font-black py-4 px-12 rounded-2xl transition-all">填寫下一份</button>
    </div>
  </div>

  <!-- Firebase SDK v12.12.1 實作 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, getIdToken } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    // 1. Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyDwAD3O6uNDWQoNITdeOEc4LqfLKC_IZRQ",
      authDomain: "tahoxdsafty.firebaseapp.com",
      projectId: "tahoxdsafty",
      storageBucket: "tahoxdsafty.firebasestorage.app",
      messagingSenderId: "863527866169",
      appId: "1:863527866169:web:eade7a0a7cfccf1be3a2e8",
      measurementId: "G-7EZNY89CC6"
    };

    // 2. GAS Web App 網址 (請確保已部署為「所有人」存取)
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwcW7PrL4Dd110QzngTQ3jPIh3Z7czdYyG9lX0Hqh5fp6jp-aKun0KSlRndDk25mosF/exec";

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const formOverlay = document.getElementById('formOverlay');
    const userInfo = document.getElementById('userInfo');
    const userNameDisplay = document.getElementById('userNameDisplay');

    // 登入狀態監聽
    onAuthStateChanged(auth, (user) => {
      if (user) {
        formOverlay.style.display = 'none';
        userInfo.classList.remove('hidden');
        userNameDisplay.innerText = `${user.displayName} (${user.email})`;
      } else {
        formOverlay.style.display = 'flex';
        userInfo.classList.add('hidden');
      }
    });

    // 登入/登出事件
    document.getElementById('loginBtn').addEventListener('click', () => signInWithPopup(auth, provider));
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

    // 設定日期
    const setDate = () => document.getElementById('todayDate').value = new Date().toISOString().split('T')[0];
    setDate();

    // 表單提交邏輯
    document.getElementById('safetyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      if (!user) return alert("請先登入！");

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-3"></i>處理中...';

      try {
        const idToken = await getIdToken(user, true);
        const formData = new FormData(e.target);
        const data = {};
        formData.forEach((value, key) => data[key] = value);

        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ token: idToken, formData: data })
        });

        const result = await response.json();
        if (result.status === "success") {
          document.getElementById('formContainer').classList.add('hidden');
          document.getElementById('successMsg').classList.remove('hidden');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          throw new Error(result.message);
        }
      } catch (err) {
        alert("提交失敗：" + err.message);
        btn.disabled = false;
        btn.innerText = "確認提交安全申報";
      }
    });

    // 全域 Reset 函數
    window.resetForm = () => {
      document.getElementById('safetyForm').reset();
      setDate();
      document.getElementById('successMsg').classList.add('hidden');
      document.getElementById('formContainer').classList.remove('hidden');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').innerText = "確認提交安全申報 (Confirm Submission)";
    };
  </script>
</body>
</html>
